nt_stop_marker: 't'

## Analysis
automatically_track_mouse: false
nt_replace_speed_by_luminance: false
nt_recompute_tracking_data: true
nt_pretime: 10 # s, pre-event time (baseline)
nt_posttime: 20 # s, post-event time (response period)
use_clean_baseline: false # if true, then removes all following same events within pretime of event.
use_ultraclean_baseline: false # if true, then removes all following events within pretime of event.

nt_behaviors:
  # behavior:   [description,              color   ]         
  run:          ['running forward',       [0.0, 0.7, 0.0]]
  turn_towards: ['turn towards object',   [0.0, 0.7, 0.0]]
  leave_wall:   ['leave wall',            [0.0, 0.7, 0.0]]
  retreat:      ['retreating',            [0.7, 0.0, 0.0]]
  turn_away:    ['turn away from object', [0.7, 0.0, 0.0]]
  touch:        ['touching object',       [0.7, 0.7, 0.0]]
  approach:     ['approaching object',    [0.0, 0.7, 0.0]]
  avoid:        ['avoiding object',       [0.7, 0.0, 0.0]]

nt_indices:  
  # index:                       [description,              color   ]         
  run_retreat_count_balance:     ['run retreat count bal',  [0, 0, 0]]
  run_retreat_fraction_balance:  ['run retreat frac bal',   [0, 0, 0]]
  turn_count_balance:            ['turn count bal',         [0, 0, 0]]
  turn_fraction_balance:         ['turn fraction bal',      [0, 0, 0]]

nt_rates:
    # rate:                            [description,            color   ]         
    forward_speed:                     ['Forward speed',        [0, 0, 0]]
    distance_to_wall:                  ['Distance to wall',     [0, 0, 0]]
    angular_velocity_towards_object:   ['Rel. ang. velocity',   [0, 0, 0]]
    object_distance_derivative:        ['\DeltaObject distance',[0, 0, 0]]

nt_max_touching_distance: 50 # mm
nt_min_run_speed: 0.09 # m/s
nt_min_approach_speed: 0.09 # m/s, change in object distance 
nt_min_retreat_speed: -0.07 # m/s, note the minus sign
nt_min_angular_velocity: 100 # deg/s
nt_max_stationarity_speed: 0.015 # m/s
nt_max_distance_to_wall: 115 # mm,  was 100 before diameter correction
nt_interaction_period: 10 # s, period to count interactions
nt_temporal_filter_width: 5 # neurotar samples
nt_object_sliding_window: 2.0 # s, window to use for peri-stimulus time averaging
count_once_per_object: true # how often behaviours can be counter per interaction period
nt_pose_temporal_filter_width: 20 #  samples for median filtering of pose tracking data

# Shuffle analysis
nt_seed: 1
nt_shuffle_number: 10 
nt_shuffle_insert_object_only_when_stationary: true
nt_shuffle_stationary_period: 2 # s, period for which the animal has to be stationary to insert object

## Photometry
rwd_slack_time: 0.02 # time window for two events to be simultaneous
rwd_n_inputs: 5 # number of input channels
rwd_initial_input_state: [1, 1, .NaN, .NaN, .NaN]

nt_photometry_window_width: 0.1 # s
nt_photometry_bin_width: 0.1 # s
nt_photometry_time_offset: 0 # shifts all photometry data 
nt_photometry_isosbestic_correction: true
nt_only_use_pretime_for_isosbestic_correction: false
nt_photometry_median_filter_window: 0.05 # s, use 0 to turn off 
nt_photometry_low_pass: 5 # Hz, use Inf to turn off
nt_photometry_high_pass: 0.01 # Hz, use 0 to turn off
nt_photometry_butterworth_order: 2
nt_photometry_zscoring: true
nt_photometry_subtract_baseline: true

nt_color_green:      [0.0, 0.8, 0.0]
nt_color_gcamp:      [0.0, 0.8, 0.0]
nt_color_gda3m:      [0.0, 0.8, 0.0]
nt_color_signal:     [0.0, 0.8, 0.0]
nt_color_isosbestic: [0.2, 0.2, 1.0]

# Spatial maps
nt_compute_maps: true
nt_map_bins: 100 # Approximate number

## Results
nt_result_shows_individual_object_insertions: true

## Tracking
nt_show_markers: true # false increases speed at the cost of information loss
nt_show_position_changes: true # false reduces visual clutter at the cost of information loss
nt_show_overhead_mouse: true
nt_show_behavior_markers: true
nt_track_timeline_max_speed: 0.375 # m/s
nt_show_help: false
nt_show_bridge: true
nt_show_horizon: true
nt_show_boundaries: true # neurotar frame 
nt_mouse_trace_window: 3 # s
nt_show_leave_wall_boundary: true
nt_forward_speed_in_speed_trace: true
nt_show_mouse_keypoints: true # true is nice, but slow
nt_show_distance_trace: false
nt_show_rotation_trace: false
nt_show_bridge: false
nt_show_horizon: false
nt_show_arena_panel: false

# tracking visuals presets with setup specific overrides 
tracking_presets:
    neurotar:
        nt_show_distance_trace: true
        nt_show_rotation_trace: true
        nt_show_bridge: true
        nt_show_horizon: true
        nt_show_arena_panel: true
